version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: owlprotect
      POSTGRES_USER: owlprotect
      POSTGRES_PASSWORD: owlprotect
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  control-plane-api:
    build:
      context: .
      dockerfile: services/control-plane-api/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:5180
    ports:
      - "5180:5180"
    depends_on:
      - postgres
      - redis

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    environment:
      ControlPlane__BaseUrl: http://control-plane-api:5180
      Gateway__Id: gw-1
      Gateway__Name: us-east-core-1
      Gateway__Region: us-east
    depends_on:
      - control-plane-api

  scheduler:
    build:
      context: .
      dockerfile: services/scheduler/Dockerfile
    environment:
      ControlPlane__BaseUrl: http://control-plane-api:5180
    depends_on:
      - control-plane-api

  admin-portal:
    build:
      context: .
      dockerfile: apps/admin-portal/Dockerfile
    ports:
      - "4173:80"
    depends_on:
      - control-plane-api

volumes:
  postgres-data:

