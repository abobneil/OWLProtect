services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${OWLP_POSTGRES_DB:-owlprotect}
      POSTGRES_USER: ${OWLP_POSTGRES_USER:-owlprotect}
      POSTGRES_PASSWORD: ${OWLP_POSTGRES_PASSWORD:-owlprotect}
    ports:
      - "${OWLP_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "${OWLP_REDIS_PORT:-6379}:6379"

  control-plane-api:
    build:
      context: .
      dockerfile: services/control-plane-api/Dockerfile
    environment:
      ASPNETCORE_URLS: ${OWLP_CONTROL_PLANE_URLS:-http://+:5180}
      Persistence__Provider: ${OWLP_PERSISTENCE_PROVIDER:-postgres}
      Persistence__ConnectionString: Host=postgres;Port=5432;Database=${OWLP_POSTGRES_DB:-owlprotect};Username=${OWLP_POSTGRES_USER:-owlprotect};Password=${OWLP_POSTGRES_PASSWORD:-owlprotect}
      Persistence__RedisConnectionString: ${OWLP_REDIS_CONNECTION_STRING:-redis:6379}
      Persistence__SeedOnStartup: ${OWLP_PERSISTENCE_SEED_ON_STARTUP:-true}
      SecretManagement__BootstrapAdminUsername: ${OWLP_BOOTSTRAP_ADMIN_USERNAME:-admin}
      SecretManagement__BootstrapAdminPassword: ${OWLP_BOOTSTRAP_ADMIN_PASSWORD:-}
      SecretManagement__BootstrapAdminPasswordFile: ${OWLP_BOOTSTRAP_ADMIN_PASSWORD_FILE:-}
      SecretManagement__BootstrapAdminPasswordHash: ${OWLP_BOOTSTRAP_ADMIN_PASSWORD_HASH:-}
      SecretManagement__BootstrapAdminPasswordHashFile: ${OWLP_BOOTSTRAP_ADMIN_PASSWORD_HASH_FILE:-}
      SecretManagement__AllowGeneratedBootstrapAdminPassword: ${OWLP_ALLOW_GENERATED_BOOTSTRAP_ADMIN_PASSWORD:-false}
      AuditRetention__Enabled: ${OWLP_AUDIT_RETENTION_ENABLED:-true}
      AuditRetention__RetentionDays: ${OWLP_AUDIT_RETENTION_DAYS:-365}
      AuditRetention__ExportBatchSize: ${OWLP_AUDIT_EXPORT_BATCH_SIZE:-5000}
      AuditRetention__CheckIntervalHours: ${OWLP_AUDIT_RETENTION_CHECK_INTERVAL_HOURS:-24}
      AuditRetention__ExportDirectory: ${OWLP_AUDIT_EXPORT_DIRECTORY:-/var/lib/owlprotect/audit-exports}
    ports:
      - "${OWLP_CONTROL_PLANE_PORT:-5180}:5180"
    volumes:
      - "${OWLP_SECRET_MOUNT_PATH:-./.secrets}:/run/owlprotect-secrets:ro"
      - "${OWLP_AUDIT_EXPORT_DIRECTORY:-./audit-exports}:/var/lib/owlprotect/audit-exports"
    depends_on:
      - postgres
      - redis

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    environment:
      ControlPlane__BaseUrl: ${OWLP_CONTROL_PLANE_BASE_URL:-http://control-plane-api:5180}
      Gateway__Id: ${OWLP_GATEWAY_ID:-gw-1}
      Gateway__Name: ${OWLP_GATEWAY_NAME:-us-east-core-1}
      Gateway__Region: ${OWLP_GATEWAY_REGION:-us-east}
      Gateway__TrustBundleFile: ${OWLP_GATEWAY_TRUST_BUNDLE_FILE:-/var/lib/owlprotect/gateway-trust-bundle.json}
    volumes:
      - "${OWLP_GATEWAY_STATE_PATH:-./.gateway-state}:/var/lib/owlprotect"
    depends_on:
      - control-plane-api

  scheduler:
    build:
      context: .
      dockerfile: services/scheduler/Dockerfile
    environment:
      ControlPlane__BaseUrl: ${OWLP_CONTROL_PLANE_BASE_URL:-http://control-plane-api:5180}
    depends_on:
      - control-plane-api

  admin-portal:
    build:
      context: .
      dockerfile: apps/admin-portal/Dockerfile
    ports:
      - "${OWLP_ADMIN_PORTAL_PORT:-4173}:80"
    depends_on:
      - control-plane-api

volumes:
  postgres-data:
