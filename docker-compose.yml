services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${OWLP_POSTGRES_DB:-owlprotect}
      POSTGRES_USER: ${OWLP_POSTGRES_USER:-owlprotect}
      POSTGRES_PASSWORD: ${OWLP_POSTGRES_PASSWORD:-owlprotect}
    ports:
      - "${OWLP_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "${OWLP_REDIS_PORT:-6379}:6379"

  control-plane-api:
    build:
      context: .
      dockerfile: services/control-plane-api/Dockerfile
    environment:
      ASPNETCORE_URLS: ${OWLP_CONTROL_PLANE_URLS:-http://+:5180}
      Persistence__Provider: ${OWLP_PERSISTENCE_PROVIDER:-postgres}
      Persistence__ConnectionString: Host=postgres;Port=5432;Database=${OWLP_POSTGRES_DB:-owlprotect};Username=${OWLP_POSTGRES_USER:-owlprotect};Password=${OWLP_POSTGRES_PASSWORD:-owlprotect}
      Persistence__SeedOnStartup: ${OWLP_PERSISTENCE_SEED_ON_STARTUP:-true}
    ports:
      - "${OWLP_CONTROL_PLANE_PORT:-5180}:5180"
    depends_on:
      - postgres
      - redis

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    environment:
      ControlPlane__BaseUrl: ${OWLP_CONTROL_PLANE_BASE_URL:-http://control-plane-api:5180}
      Gateway__Id: ${OWLP_GATEWAY_ID:-gw-1}
      Gateway__Name: ${OWLP_GATEWAY_NAME:-us-east-core-1}
      Gateway__Region: ${OWLP_GATEWAY_REGION:-us-east}
    depends_on:
      - control-plane-api

  scheduler:
    build:
      context: .
      dockerfile: services/scheduler/Dockerfile
    environment:
      ControlPlane__BaseUrl: ${OWLP_CONTROL_PLANE_BASE_URL:-http://control-plane-api:5180}
    depends_on:
      - control-plane-api

  admin-portal:
    build:
      context: .
      dockerfile: apps/admin-portal/Dockerfile
    ports:
      - "${OWLP_ADMIN_PORTAL_PORT:-4173}:80"
    depends_on:
      - control-plane-api

volumes:
  postgres-data:
