name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  npm-validate:
    name: NPM Validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: Type-check workspaces
        run: npm run typecheck

      - name: Build workspaces
        run: npm run build

  docker-build:
    name: Docker Build (${{ matrix.target.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: admin-portal
            dockerfile: apps/admin-portal/Dockerfile
          - name: control-plane-api
            dockerfile: services/control-plane-api/Dockerfile
          - name: gateway
            dockerfile: services/gateway/Dockerfile
          - name: scheduler
            dockerfile: services/scheduler/Dockerfile

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.target.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.target.dockerfile }}
          push: false
          tags: owlprotect/${{ matrix.target.name }}:ci
