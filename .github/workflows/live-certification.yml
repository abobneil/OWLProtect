name: Live Certification

on:
  workflow_dispatch:

jobs:
  linux-staging:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: Run staging-like disposable validation
        shell: pwsh
        run: ./scripts/e2e/Invoke-DisposableCertification.ps1 -EnvFile ./.env.e2e.example

  windows-vm-certification:
    runs-on: [self-hosted, windows, vmware]
    needs: linux-staging

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Win11 test box client flow
        shell: pwsh
        run: >
          ./windows/e2e/Invoke-Win11TestboxValidation.ps1
          -GuestUsername "${{ secrets.OWLP_VM_GUEST_USERNAME }}"
          -GuestPassword "${{ secrets.OWLP_VM_GUEST_PASSWORD }}"
          -ControlPlaneBaseUrl "${{ vars.OWLP_LIVE_CONTROL_PLANE_URL }}"

      - name: Upload live certification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-certification-evidence
          path: artifacts/e2e
