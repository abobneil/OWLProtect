name: Disposable E2E

on:
  workflow_dispatch:

jobs:
  disposable-e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: Run disposable certification flow
        shell: pwsh
        run: ./scripts/e2e/Invoke-DisposableCertification.ps1 -EnvFile ./.env.e2e.example

      - name: Upload disposable evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: disposable-e2e-evidence
          path: artifacts/e2e
